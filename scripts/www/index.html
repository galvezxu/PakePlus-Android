    container.style.display = (window.innerWidth >= 768) ? "grid" : "block";
    document.getElementById("noResult").style.display = "none";
    document.getElementById("totalRows").innerText = filteredData.length;
    
    const totalPages = Math.ceil(filteredData.length / pageSize);
    document.getElementById("pageInfoTop").innerText = `第 ${currentPage} / ${totalPages} 页`;
    
    for (let i = start; i < end; i++) {
        const item = filteredData[i];
        const card = document.createElement("div");
        card.className = "item-card";
        
        let statusClass = item.status === "永久有效" ? "status-tag valid" : "status-tag";
        let btnHtml = item.url ? `<a href="${item.url}" target="_blank" class="btn-link">🔗 打开夸克网盘</a>` : '<span style="color:#94a3b8; font-size:13px; flex:1; text-align:center;">暂无有效链接</span>';
        let codeHtml = item.code && item.code !== '-' ? `<div class="code-wrapper">🔑 码: <strong>${escapeHtml(item.code)}</strong></div>` : `<div class="code-wrapper" style="color:#94a3b8">免密</div>`;
        
        card.innerHTML = `
            <div class="item-header">
                <div class="item-title">${escapeHtml(item.name)}</div>
                <div class="${statusClass}">${escapeHtml(item.status)}</div>
            </div>
            <div class="item-detail">
                <div class="detail-label">分类目录:</div>
                <div class="detail-value">${escapeHtml(item.dir)}</div>
                <div class="detail-label">分享时间:</div>
                <div class="detail-value">${escapeHtml(item.time)}</div>
            </div>
            <div class="action-row">
                ${codeHtml}
                ${btnHtml}
            </div>
        `;
        container.appendChild(card);
    }
    
    renderPagination(totalPages);
}

function renderPagination(totalPages) {
    const container = document.getElementById("pagination");
    container.innerHTML = "";
    
    if (totalPages <= 1) return;
    
    // 上一页
    const prevBtn = document.createElement("button");
    prevBtn.className = "page-btn";
    prevBtn.innerText = "上一页";
    prevBtn.disabled = currentPage === 1;
    prevBtn.onclick = () => { 
        currentPage--; 
        renderList(); 
        window.scrollTo({top: 0, behavior: 'smooth'});
    };
    container.appendChild(prevBtn);
    
    // 中间页码文字
    const info = document.createElement("span");
    info.className = "page-info";
    info.innerText = `${currentPage} / ${totalPages}`;
    container.appendChild(info);
    
    // 下一页
    const nextBtn = document.createElement("button");
    nextBtn.className = "page-btn";
    nextBtn.innerText = "下一页";
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.onclick = () => { 
        currentPage++; 
        renderList(); 
        window.scrollTo({top: 0, behavior: 'smooth'});
    };
    container.appendChild(nextBtn);
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// 防抖搜索逻辑，防止手机打字输入太快时卡顿
let searchTimeout;
document.getElementById("searchInput").addEventListener("input", function(e) {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        const query = e.target.value.trim().toUpperCase();
        if (!query) {
            filteredData = [...allData];
        } else {
            filteredData = allData.filter(item => {
                return (item.dir && item.dir.toUpperCase().includes(query)) ||
                       (item.name && item.name.toUpperCase().includes(query)) ||
                       (item.time && item.time.toUpperCase().includes(query)) ||
                       (item.code && item.code.toUpperCase().includes(query));
            });
        }
        currentPage = 1;
        renderList();
    }, 150); // 150毫秒防抖
});

// 监听窗口大小改变，微调大屏下的网格布局
window.addEventListener('resize', () => {
    const container = document.getElementById("listContainer");
    if (filteredData.length > 0) {
        container.style.display = (window.innerWidth >= 768) ? "grid" : "block";
    }
});

// 首次加载
renderList();
</script>
